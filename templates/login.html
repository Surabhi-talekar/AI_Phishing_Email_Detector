<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberShield AI - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#0f172a;
background-image:linear-gradient(135deg,#0f172a,#111827);

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.login-box{

width:400px;

background:#1e293b;

padding:40px;

border-radius:15px;

box-shadow:0 0 25px rgba(0,255,255,.2);

}

h1{

text-align:center;

color:#38bdf8;

margin-bottom:10px;

}

p{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;

}

input{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:8px;

background:#0f172a;

color:white;

font-size:16px;

outline:none;

}

input:focus{

border:1px solid #38bdf8;

box-shadow:0 0 8px #38bdf8;

}

button{

width:100%;

padding:15px;

margin-top:25px;

background:#0ea5e9;

border:none;

border-radius:8px;

font-size:18px;

color:white;

cursor:pointer;

}

button:hover{

background:#0284c7;

}

.error{

margin-top:20px;

text-align:center;

color:#ef4444;

font-weight:bold;

}

</style>

</head>

<body>

<div class="login-box">

<h1>🛡 CyberShield AI</h1>

<p>Secure Login</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

</div>

</body>
</html>
